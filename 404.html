<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>صفحه پیدا نشد | نمکدون</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="./assets/img/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./assets/css/peyda.css" />
    <link rel="stylesheet" href="./assets/css/main.css" />
    <script>
      (function () {
        try {
          var parts = location.pathname.split("/").filter(Boolean);
          var i = parts.indexOf("recipe");
          if (i >= 0 && parts[i + 1]) {
            var slug = decodeURIComponent(parts[i + 1]);
            location.replace("/recipe/?slug=" + encodeURIComponent(slug));
            return;
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div class="page">
      <main class="container" style="padding:3rem 0">
        <div class="empty-state">
          <h1>۴۰۴</h1>
          <p>این صفحه در نمکدون پیدا نشد.</p>
          <p style="margin-top:1rem">
            <a class="btn btn-primary" href="./">بازگشت به خانه</a>
          </p>
        </div>
      </main>
    </div>
  </body>
</html>
