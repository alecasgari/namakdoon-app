<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>نمکدون | دستورهای آشپزی ساده و خوش‌طعم</title>
    <meta
      name="description"
      content="نمکدون، مجموعه شخصی دستورهای آشپزی فارسی. دستورها را ببینید و مواد را بر اساس تعداد نفرات تنظیم کنید."
    />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="theme-color" content="#2f6b5a" />
    <meta name="author" content="Alec Asgari" />
    <link rel="canonical" href="https://namakdoon.alecasgari.com/" />
    <link rel="alternate" hreflang="fa" href="https://namakdoon.alecasgari.com/" />
    <link rel="alternate" type="text/plain" href="https://namakdoon.alecasgari.com/llms.txt" title="llms.txt" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fa_IR" />
    <meta property="og:site_name" content="نمکدون" />
    <meta property="og:title" content="نمکدون | دستورهای آشپزی ساده و خوش‌طعم" />
    <meta
      property="og:description"
      content="دستورهای فارسی، مقیاس‌پذیر برای تعداد نفرات، با جستجوی عنوان، تگ و مواد."
    />
    <meta property="og:url" content="https://namakdoon.alecasgari.com/" />
    <meta property="og:image" content="https://namakdoon.alecasgari.com/assets/img/og-cover.png" />
    <meta property="og:image:width" content="1920" />
    <meta property="og:image:height" content="1080" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="نمکدون" />
    <meta name="twitter:description" content="دستورهای آشپزی فارسی، ساده و موبایل‌فرست." />
    <meta name="twitter:image" content="https://namakdoon.alecasgari.com/assets/img/og-cover.png" />
    <link rel="icon" href="./assets/img/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./assets/css/peyda.css" />
    <link rel="stylesheet" href="./assets/css/main.css" />
    <script>
      (function () {
        try {
          if (localStorage.getItem("namakdoon_theme") === "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
          }
        } catch (e) {}
      })();
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "نمکدون",
        "url": "https://namakdoon.alecasgari.com/",
        "inLanguage": "fa",
        "description": "مجموعه دستورهای آشپزی فارسی",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://namakdoon.alecasgari.com/recipes/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body data-page="home">
    <div class="page">
      <header class="site-header">
        <div class="container nav">
          <a class="brand" data-href="" aria-label="نمکدون">
            <span class="brand-mark" data-brand-icon></span>
            <span class="brand-text">
              <strong>نمکدون</strong>
              <small>آشپزی ساده‌تر</small>
            </span>
          </a>
          <nav class="nav-links" aria-label="منوی اصلی">
            <a data-nav="home" data-href="">خانه</a>
            <a data-nav="recipes" data-href="recipes/">دستورها</a>
          </nav>
        </div>
      </header>

      <main>
        <section class="hero">
          <div class="hero-bg" role="img" aria-label="پس‌زمینه آشپزخانه نمکدون"></div>
          <div class="container hero-content">
            <p class="hero-brand"><span aria-hidden="true"></span> نمکدون</p>
            <h1>چی می‌خوای بپزی؟</h1>
            <p>عنوان، تگ، ماده غذایی یا اسم غذا را جستجو کن.</p>
            <form class="hero-search" data-global-search novalidate>
              <div class="hero-search-shell">
                <span class="hero-search-icon" data-search-icon></span>
                <input
                  type="search"
                  name="q"
                  data-search-input
                  autocomplete="off"
                  enterkeyhint="search"
                  aria-label="جستجوی دستور"
                  placeholder="مثلاً زرشک‌پلو، مرغ، ناهار..."
                />
                <button type="submit" class="hero-search-btn">جستجو</button>
              </div>
              <div class="hero-search-hints" aria-hidden="true">
                <span>عنوان غذا</span>
                <span>تگ</span>
                <span>ماده غذایی</span>
                <span>وعده</span>
              </div>
            </form>
          </div>
        </section>

        <section class="section">
          <div class="container">
            <div class="section-head">
              <div>
                <h2>تازه‌ترین دستورها</h2>
                <p><span data-recipe-count>۰</span> دستور در نمکدون</p>
              </div>
              <a class="btn btn-ghost" data-href="recipes/">همه دستورها</a>
            </div>
            <div class="recipe-grid" data-home-grid>
              <div class="loading">در حال بارگذاری...</div>
            </div>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <div class="container footer-grid">
          <div>
            <strong>نمکدون</strong>
            <div>دستورهای فارسی، ساده و قابل مقیاس</div>
          </div>
          <div class="footer-meta">
            <a data-href="admin/" data-admin-label>ورود</a>
            <span>© <span data-year></span> Alec Asgari</span>
          </div>
        </div>
      </footer>
    </div>

    <script src="./assets/js/config.js"></script>
    <script src="./assets/js/recipe-scale.js"></script>
    <script src="./assets/js/api.js"></script>
    <script src="./assets/js/ui.js"></script>
    <script src="./assets/js/nav.js"></script>
    <script>
      document.querySelector("[data-brand-icon]").innerHTML = window.NamakUI.icon("salt");
      document.querySelector("[data-search-icon]").innerHTML = window.NamakUI.icon("search");
    </script>
    <script src="./assets/js/pages-home.js"></script>
  </body>
</html>
